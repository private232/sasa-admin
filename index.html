<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - إدارة الامتحانات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #2b2d42;
            --border: #e9ecef;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { 
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            margin: 0; padding: 20px; color: var(--text); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }
        .container {
            width: 100%; max-width: 1000px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: slideUp 0.6s ease-out;
            display: none;
            margin-top: 20px;
        }
        
        #loginContainer { max-width: 450px; display: block; text-align: center; margin-top: 10vh; }
        
        h1, h2 { text-align: center; color: var(--primary); font-weight: 800; }
        h1 { margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select {
            width: 100%; padding: 12px 15px; border: 1px solid var(--border);
            border-radius: 10px; font-size: 16px; outline: none;
            transition: all 0.3s; background: #f8fafc;
        }
        input:focus, select:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2); }
        
        .question-card {
            background: var(--surface); border-radius: 15px; padding: 25px;
            margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-right: 5px solid var(--primary);
            animation: fadeIn 0.5s ease;
        }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
        
        button {
            background: var(--primary); color: white; border: none;
            padding: 15px 25px; border-radius: 10px; font-size: 16px;
            cursor: pointer; transition: transform 0.2s, background 0.3s; font-weight: 800; width: 100%;
        }
        button:hover { background: var(--secondary); transform: translateY(-2px); }
        .btn-add { background: var(--success); margin-top: 10px; }
        .btn-submit { background: var(--text); margin-top: 30px; font-size: 18px; }
        .btn-logout { background: var(--danger); width: auto; padding: 10px 20px; float: left; margin-bottom: 20px;}
        
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 20px;}
        .header-actions h1 { margin: 0; }

        .error-msg { color: var(--danger); font-weight: bold; margin-top: 15px; display: none; }
        
        /* تصميم التبويبات Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; background: #f1f5f9; padding: 10px; border-radius: 12px; }
        .tab-btn { background: transparent; color: var(--text); padding: 12px; border-radius: 8px; width: 50%; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(67, 97, 238, 0.3); }
        .section-content { display: none; animation: fadeIn 0.4s; }
        .section-content.active { display: block; }

        /* تصميم جدول النتائج */
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar input { flex: 1; }
        .search-bar button { width: auto; white-space: nowrap; }
        
        .table-responsive { overflow-x: auto; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; background: white; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: #f8fafc; color: var(--primary); font-weight: 800; position: sticky; top: 0; }
        tr:hover { background: #f1f5f9; }
        
        .badge { padding: 5px 10px; border-radius: 20px; font-weight: bold; font-size: 12px; display: inline-block; }
        .badge-pass { background: #d1fae5; color: #065f46; }
        .badge-fail { background: #fee2e2; color: #991b1b; }
        .student-motivation { max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .student-motivation:hover { white-space: normal; overflow: visible; background: white; position: absolute; z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 10px; border-radius: 8px; max-width: 300px;}

        #loader { display: none; text-align: center; margin-top: 20px; color: var(--primary); font-weight: bold; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container" id="loginContainer">
    <h1>🔒 دخول الإدارة</h1>
    <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="adminEmail" placeholder="admin@ssc.com" required>
    </div>
    <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="adminPassword" placeholder="••••••••" required>
    </div>
    <button type="button" onclick="adminLogin()">تسجيل الدخول</button>
    <div id="loginError" class="error-msg">بيانات الدخول غير صحيحة!</div>
</div>

<div class="container" id="dashboardContainer">
    <div class="header-actions">
        <h1>⚙️ لوحة تحكم مدرسة SSC</h1>
        <button type="button" class="btn-logout" onclick="adminLogout()">تسجيل خروج 🚪</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tabAddExam" onclick="switchTab('addExam')">📝 إضافة امتحان جديد</button>
        <button class="tab-btn" id="tabResults" onclick="switchTab('results')">📊 عرض نتائج الطلاب</button>
    </div>

    <div id="addExamSection" class="section-content active">
        <div class="form-group">
            <label>السنة الدراسية (مثال: 2026)</label>
            <input type="text" id="examYear" placeholder="أدخل السنة" required value="2026">
        </div>
        <div class="form-group">
            <label>كود الامتحان (Exam ID)</label>
            <input type="text" id="examId" placeholder="مثال: Test" required value="Test">
        </div>
        <div class="form-group">
            <label>مدة الامتحان (بالدقائق)</label>
            <input type="number" id="examDuration" placeholder="مثال: 60" required>
        </div>

        <div id="questionsContainer"></div>

        <button type="button" class="btn-add" onclick="addQuestionCard()">+ إضافة سؤال جديد</button>
        <button type="button" class="btn-submit" onclick="submitExam()">🚀 حفظ الامتحان في قاعدة البيانات</button>
        
        <div id="loader">جاري الحفظ... برجاء الانتظار ⏳</div>
    </div>

    <div id="resultsSection" class="section-content">
        <div class="search-bar">
            <input type="text" id="searchYear" placeholder="السنة (مثال: 2026)" value="2026">
            <input type="text" id="searchExamId" placeholder="كود الامتحان (مثال: Test)" value="Test">
            <button type="button" onclick="fetchResults()">جلب النتائج 🔍</button>
        </div>

        <div class="table-responsive" id="resultsTableContainer">
            <div style="text-align: center; padding: 40px; color: var(--text-muted); font-weight: bold;">
                الرجاء الضغط على "جلب النتائج" لعرض بيانات الطلاب.
            </div>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    // أضفنا get لسحب البيانات
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCIrvgkvKMs3_CokaZ4Fudwfe6XOyZu-7M",
        authDomain: "sasa-87bff.firebaseapp.com",
        databaseURL: "https://sasa-87bff-default-rtdb.firebaseio.com",
        projectId: "sasa-87bff",
        storageBucket: "sasa-87bff.firebasestorage.app",
        messagingSenderId: "699606689744",
        appId: "1:699606689744:web:08614e12b0fe9143ee7bd5",
        measurementId: "G-HD8VZXSDSR"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // مراقبة حالة تسجيل الدخول
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardContainer').style.display = 'block';
        } else {
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('dashboardContainer').style.display = 'none';
        }
    });

    // دالة تسجيل الدخول
    window.adminLogin = async function() {
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value.trim();
        const errorDiv = document.getElementById('loginError');

        if(!email || !password) {
            errorDiv.innerText = "برجاء إدخال البريد وكلمة المرور.";
            errorDiv.style.display = 'block';
            return;
        }

        try {
            await signInWithEmailAndPassword(auth, email, password);
            errorDiv.style.display = 'none';
            document.getElementById('adminEmail').value = '';
            document.getElementById('adminPassword').value = '';
        } catch (error) {
            console.error("Login Error:", error);
            errorDiv.innerText = "البيانات غير صحيحة أو الحساب غير موجود.";
            errorDiv.style.display = 'block';
        }
    };

    // دالة تسجيل الخروج
    window.adminLogout = function() {
        signOut(auth).then(() => {
            console.log("تم تسجيل الخروج");
        }).catch((error) => {
            console.error("Sign Out Error", error);
        });
    };

    // --- التبديل بين التبويبات ---
    window.switchTab = function(tabName) {
        document.getElementById('addExamSection').classList.remove('active');
        document.getElementById('resultsSection').classList.remove('active');
        document.getElementById('tabAddExam').classList.remove('active');
        document.getElementById('tabResults').classList.remove('active');

        if(tabName === 'addExam') {
            document.getElementById('addExamSection').classList.add('active');
            document.getElementById('tabAddExam').classList.add('active');
        } else {
            document.getElementById('resultsSection').classList.add('active');
            document.getElementById('tabResults').classList.add('active');
            // سحب النتائج تلقائياً عند فتح التبويب
            fetchResults();
        }
    };

    // --- جلب وعرض نتائج الطلاب ---
    window.fetchResults = async function() {
        const year = document.getElementById('searchYear').value.trim();
        const examId = document.getElementById('searchExamId').value.trim();
        const container = document.getElementById('resultsTableContainer');

        if(!year || !examId) {
            alert("برجاء إدخال السنة وكود الامتحان للبحث");
            return;
        }

        container.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--primary);">جاري تحميل البيانات... ⏳</div>`;

        try {
            const resultsRef = ref(db, `exam_results/${year}/${examId}`);
            const snapshot = await get(resultsRef);

            if (snapshot.exists()) {
                const data = snapshot.val();
                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>الاسم الرباعي</th>
                                <th>العمر</th>
                                <th>الطول/الوزن</th>
                                <th>اللبس/الحذاء</th>
                                <th>الرياضة</th>
                                <th>النتيجة</th>
                                <th>الحالة</th>
                                <th>كود التذكرة</th>
                                <th>الطموح (سبب التقديم)</th>
                                <th>وقت التسجيل</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                let counter = 1;
                // تحويل الـ Object لـ Array لعرضه
                Object.values(data).forEach(student => {
                    const statusClass = student.status.includes("Pass") || student.status.includes("ناجح") ? "badge-pass" : "badge-fail";
                    const sportsList = Array.isArray(student.sports) ? student.sports.join(', ') : student.sports;
                    
                    html += `
                        <tr>
                            <td>${counter++}</td>
                            <td style="font-weight:bold;">${student.name || '-'}</td>
                            <td>${student.age || '-'}</td>
                            <td dir="ltr">${student.height || '-'} cm <br> ${student.weight || '-'} kg</td>
                            <td dir="ltr">${student.clothesSize || '-'} <br>👟 ${student.shoeSize || '-'}</td>
                            <td>${sportsList || '-'}</td>
                            <td style="font-weight:bold; font-size:16px;">${student.score}/${student.totalScore}</td>
                            <td><span class="badge ${statusClass}">${student.status}</span></td>
                            <td style="font-weight:bold; color: var(--primary); letter-spacing:1px;">${student.ticketCode || '-'}</td>
                            <td><div class="student-motivation">${student.motivation || '-'}</div></td>
                            <td style="font-size: 12px; color: var(--text-muted);">${student.submissionTime || '-'}</td>
                        </tr>
                    `;
                });

                html += `</tbody></table>`;
                container.innerHTML = html;

            } else {
                container.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--danger); font-weight:bold;">لا توجد أي نتائج مسجلة لهذا الامتحان حتى الآن.</div>`;
            }
        } catch (error) {
            console.error("Error fetching results: ", error);
            container.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--danger); font-weight:bold;">حدث خطأ أثناء جلب البيانات. تأكد من الصلاحيات والاتصال بالإنترنت.</div>`;
        }
    };

    // --- أكواد إضافة الامتحان (الأساسية) ---
    let questionCount = 0;

    window.addQuestionCard = function() {
        questionCount++;
        const container = document.getElementById('questionsContainer');
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q_${questionCount}`;
        
        card.innerHTML = `
            <h3 style="color: var(--primary); margin-top:0;">السؤال رقم ${questionCount}</h3>
            <div class="form-group">
                <label>نص السؤال</label>
                <input type="text" class="q-text" placeholder="اكتب السؤال هنا..." required>
            </div>
            <div class="form-group">
                <label>رابط الصورة (اختياري)</label>
                <input type="url" class="q-image" placeholder="https://example.com/image.png">
            </div>
            <label>الخيارات (4 خيارات)</label>
            <div class="options-grid">
                <input type="text" class="q-opt" placeholder="الخيار 1" required>
                <input type="text" class="q-opt" placeholder="الخيار 2" required>
                <input type="text" class="q-opt" placeholder="الخيار 3" required>
                <input type="text" class="q-opt" placeholder="الخيار 4" required>
            </div>
            <div class="form-group" style="margin-top: 20px;">
                <label style="color: var(--success);">الإجابة الصحيحة (يجب أن تطابق أحد الخيارات بالضبط)</label>
                <input type="text" class="q-correct" placeholder="اكتب الإجابة الصحيحة هنا" required style="border-color: var(--success); background: #f0fdf4;">
            </div>
        `;
        container.appendChild(card);
    };

    window.submitExam = async function() {
        if (!auth.currentUser) {
            alert("يجب تسجيل الدخول أولاً!");
            return;
        }

        const year = document.getElementById('examYear').value.trim();
        const examId = document.getElementById('examId').value.trim();
        const duration = parseInt(document.getElementById('examDuration').value);
        
        if(!year || !examId || !duration) {
            alert('برجاء ملء البيانات الأساسية للامتحان');
            return;
        }

        const questionCards = document.querySelectorAll('.question-card');
        if(questionCards.length === 0) {
            alert('برجاء إضافة سؤال واحد على الأقل');
            return;
        }

        let questionsArray = [];
        let isValid = true;

        questionCards.forEach((card) => {
            const text = card.querySelector('.q-text').value.trim();
            const imageUrl = card.querySelector('.q-image').value.trim();
            const opts = Array.from(card.querySelectorAll('.q-opt')).map(inp => inp.value.trim());
            const correct = card.querySelector('.q-correct').value.trim();

            if(!text || opts.includes("") || !correct) {
                isValid = false;
            }

            questionsArray.push({
                question: text,
                imageUrl: imageUrl,
                options: opts,
                correctAnswer: correct
            });
        });

        if(!isValid) {
            alert('برجاء إكمال جميع حقول الأسئلة والخيارات');
            return;
        }

        document.getElementById('loader').style.display = 'block';

        const examData = {
            duration: duration,
            questions: questionsArray
        };

        try {
            await set(ref(db, `exams/${year}/${examId}`), examData);
            alert('🎉 تم حفظ الامتحان بنجاح!');
            document.getElementById('questionsContainer').innerHTML = '';
            questionCount = 0;
            addQuestionCard();
        } catch (error) {
            console.error("Error adding exam: ", error);
            if(error.code === 'PERMISSION_DENIED') {
                alert('عذراً، لا تمتلك الصلاحية لإضافة امتحان. تأكد من قواعد بيانات Firebase.');
            } else {
                alert('حدث خطأ أثناء الحفظ. تأكد من الاتصال بالإنترنت.');
            }
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    };

    // إضافة سؤال افتراضي عند فتح الصفحة
    addQuestionCard();
</script>
</body>
</html>
