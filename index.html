<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - إضافة امتحان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #2b2d42;
            --border: #e9ecef;
            --success: #4cc9f0;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { 
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            margin: 0; padding: 20px; color: var(--text); min-height: 100vh;
        }
        .container {
            max-width: 900px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: slideUp 0.6s ease-out;
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; font-weight: 800; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select {
            width: 100%; padding: 12px; border: 1px solid var(--border);
            border-radius: 10px; font-size: 16px; outline: none;
            transition: all 0.3s;
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2); }
        .question-card {
            background: var(--surface); border-radius: 15px; padding: 20px;
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-right: 5px solid var(--primary);
            animation: fadeIn 0.5s ease;
        }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
        button {
            background: var(--primary); color: white; border: none;
            padding: 12px 25px; border-radius: 10px; font-size: 16px;
            cursor: pointer; transition: transform 0.2s, background 0.3s; font-weight: 600;
        }
        button:hover { background: var(--secondary); transform: translateY(-2px); }
        .btn-add { background: var(--success); width: 100%; margin-top: 10px; }
        .btn-submit { background: var(--text); width: 100%; margin-top: 30px; padding: 15px; font-size: 18px; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Loader */
        #loader { display: none; text-align: center; margin-top: 20px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 إضافة امتحان جديد</h1>
    
    <div class="form-group">
        <label>السنة الدراسية (مثال: 2024)</label>
        <input type="text" id="examYear" placeholder="أدخل السنة" required>
    </div>
    <div class="form-group">
        <label>كود الامتحان (Exam ID)</label>
        <input type="text" id="examId" placeholder="مثال: math_101" required>
    </div>
    <div class="form-group">
        <label>مدة الامتحان (بالدقائق)</label>
        <input type="number" id="examDuration" placeholder="مثال: 60" required>
    </div>

    <div id="questionsContainer"></div>

    <button type="button" class="btn-add" onclick="addQuestionCard()">+ إضافة سؤال جديد</button>
    <button type="button" class="btn-submit" onclick="submitExam()">🚀 حفظ الامتحان في قاعدة البيانات</button>
    
    <div id="loader">جاري الحفظ... برجاء الانتظار ⏳</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCIrvgkvKMs3_CokaZ4Fudwfe6XOyZu-7M",
        authDomain: "sasa-87bff.firebaseapp.com",
        databaseURL: "https://sasa-87bff-default-rtdb.firebaseio.com",
        projectId: "sasa-87bff",
        storageBucket: "sasa-87bff.firebasestorage.app",
        messagingSenderId: "699606689744",
        appId: "1:699606689744:web:08614e12b0fe9143ee7bd5",
        measurementId: "G-HD8VZXSDSR"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let questionCount = 0;

    window.addQuestionCard = function() {
        questionCount++;
        const container = document.getElementById('questionsContainer');
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q_${questionCount}`;
        
        card.innerHTML = `
            <h3>السؤال رقم ${questionCount}</h3>
            <div class="form-group">
                <label>نص السؤال</label>
                <input type="text" class="q-text" placeholder="اكتب السؤال هنا..." required>
            </div>
            <div class="form-group">
                <label>رابط الصورة (اختياري)</label>
                <input type="url" class="q-image" placeholder="https://example.com/image.png">
            </div>
            <label>الخيارات (4 خيارات)</label>
            <div class="options-grid">
                <input type="text" class="q-opt" placeholder="الخيار 1" required>
                <input type="text" class="q-opt" placeholder="الخيار 2" required>
                <input type="text" class="q-opt" placeholder="الخيار 3" required>
                <input type="text" class="q-opt" placeholder="الخيار 4" required>
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>الإجابة الصحيحة (يجب أن تطابق أحد الخيارات بالضبط)</label>
                <input type="text" class="q-correct" placeholder="اكتب الإجابة الصحيحة هنا" required>
            </div>
        `;
        container.appendChild(card);
    };

    window.submitExam = async function() {
        const year = document.getElementById('examYear').value.trim();
        const examId = document.getElementById('examId').value.trim();
        const duration = parseInt(document.getElementById('examDuration').value);
        
        if(!year || !examId || !duration) {
            alert('برجاء ملء البيانات الأساسية للامتحان');
            return;
        }

        const questionCards = document.querySelectorAll('.question-card');
        if(questionCards.length === 0) {
            alert('برجاء إضافة سؤال واحد على الأقل');
            return;
        }

        let questionsArray = [];
        let isValid = true;

        questionCards.forEach((card) => {
            const text = card.querySelector('.q-text').value.trim();
            const imageUrl = card.querySelector('.q-image').value.trim();
            const opts = Array.from(card.querySelectorAll('.q-opt')).map(inp => inp.value.trim());
            const correct = card.querySelector('.q-correct').value.trim();

            if(!text || opts.includes("") || !correct) {
                isValid = false;
            }

            questionsArray.push({
                question: text,
                imageUrl: imageUrl,
                options: opts,
                correctAnswer: correct
            });
        });

        if(!isValid) {
            alert('برجاء إكمال جميع حقول الأسئلة والخيارات');
            return;
        }

        document.getElementById('loader').style.display = 'block';

        const examData = {
            duration: duration,
            questions: questionsArray
        };

        try {
            await set(ref(db, `exams/${year}/${examId}`), examData);
            alert('🎉 تم حفظ الامتحان بنجاح!');
            // تنظيف الفورم
            document.getElementById('questionsContainer').innerHTML = '';
            questionCount = 0;
            document.getElementById('examId').value = '';
        } catch (error) {
            console.error("Error adding exam: ", error);
            alert('حدث خطأ أثناء الحفظ. راجع الكونسول.');
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    };

    // إضافة سؤال افتراضي عند فتح الصفحة
    addQuestionCard();
</script>
</body>
</html>
